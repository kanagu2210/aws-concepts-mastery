- id: 1
  slug: why-cloud-computing-exists
  title: Why Cloud Computing Exists at All
  layer: 1
  layer_name: Foundations
  spine_type: mental_model
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: foundation
  cognitive_role: model
  concept_spine: Cloud computing exists because buying compute capacity is like buying
    electricity — you want to pay for exactly what you use when you use it, not build
    and maintain your own power plant.
  notes: CCP Task 1.1
- id: 2
  slug: economies-of-scale-advantage
  title: How Economies of Scale Make Cloud Cheaper
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: foundation
  cognitive_role: model
  concept_spine: AWS can offer compute cheaper than you can build it because they
    spread the cost of hardware, power, cooling, and expertise across millions of
    customers instead of you bearing it alone.
  notes: CCP Task 1.1
- id: 3
  slug: elasticity-vs-scalability
  title: Elasticity vs Scalability
