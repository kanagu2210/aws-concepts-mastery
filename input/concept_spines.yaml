  concept_tier: foundation
  cognitive_role: contrast
  concept_spine: IAM users are for humans who need long-term credentials and console
    access, while IAM roles are for services, applications, and temporary access scenarios
    — so use roles whenever possible because they provide temporary credentials that
    automatically rotate.
  notes: CCP Task 2.3 | SAA Task 1.1 | SAP Task 1.2
- id: 642
  slug: l4-resource-based-vs-identity-based-policies-attachment-point
