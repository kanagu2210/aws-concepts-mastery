- id: 21
  slug: aws-global-infrastructure-model
  title: How AWS Built a Planet-Scale Infrastructure
  layer: 1
  layer_name: Foundations
  spine_type: mental_model
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: foundation
  cognitive_role: model
  concept_spine: AWS built its global infrastructure as independent Regions connected
    by a private network backbone, where each Region contains multiple isolated Availability
    Zones, so you can architect for both local resilience and global reach.
  notes: CCP Task 3.2
- id: 22
  slug: aws-region-design-principles
  title: Why AWS Regions Are Completely Independent
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: core
  cognitive_role: definition
  concept_spine: Each AWS Region is designed to be completely independent with its
    own power, cooling, physical security, and network connectivity, so a disaster
    in one Region cannot cascade to affect another Region.
  notes: CCP Task 3.2 | SAA Task 2.2 | SAP Task 1.3
- id: 23
  slug: availability-zone-isolation-model
  title: How Availability Zones Provide Fault Isolation
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: core
  cognitive_role: model
  concept_spine: Availability Zones are physically separate data centers within a
    Region, connected by low-latency links but isolated enough that floods, fires,
    or power outages affect only one AZ at a time.
  notes: CCP Task 3.2 | SAA Task 2.2 | SAP Task 1.3
- id: 24
  slug: edge-location-acceleration-model
  title: How Edge Locations Bring AWS Closer to Users
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: Amazon CloudFront
  concept_tier: core
  cognitive_role: definition
  concept_spine: Edge locations are AWS points of presence around the world that cache
    content and accelerate network paths, so users get faster responses by connecting
    to the nearest edge rather than traveling all the way to your home Region.
  notes: CCP Task 3.2 | CCP Task 3.5 | SAA Task 3.4
- id: 25
  slug: shared-responsibility-boundary
  title: The Line That Determines Who Secures What
  layer: 1
  layer_name: Foundations
  spine_type: mental_model
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: foundation
  cognitive_role: model
  concept_spine: AWS secures the cloud infrastructure itself while you secure everything
    you put in the cloud, with the boundary shifting based on how much of the stack
    AWS manages for you in each service.
  notes: CCP Task 2.1 | SAA Task 1.1 | SAP Task 1.2
- id: 26
  slug: security-of-vs-in-the-cloud
  title: Why AWS and Customer Security Responsibilities Differ
  layer: 1
  layer_name: Foundations
  spine_type: contrast
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: core
  cognitive_role: contrast
  concept_spine: Security OF the cloud means AWS protects the physical infrastructure,
    hypervisor, and service software, while security IN the cloud means you protect
    your data, applications, operating systems, and network configurations.
  notes: CCP Task 2.1 | SAA Task 1.1 | SAP Task 1.2
- id: 27
  slug: managed-service-responsibility-shift
  title: How Managed Services Change Your Security Responsibilities
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: core
  cognitive_role: model
  concept_spine: The more AWS manages for you in a service, the fewer security responsibilities
    you have—RDS manages OS patches that you handle yourself on EC2, and Lambda manages
    even more of the stack.
  notes: CCP Task 2.1 | SAA Task 1.1 | SAP Task 1.2
- id: 28
  slug: aws-compliance-inheritance-model
  title: How You Inherit AWS Compliance Certifications
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: false
  domain: Security and Compliance
  aws_service: AWS Artifact
  concept_tier: core
  cognitive_role: definition
  concept_spine: When AWS achieves compliance certifications like SOC 2 or ISO 27001
    for their infrastructure, you inherit that compliance foundation for the parts
    of the stack AWS manages, but you must still comply for the parts you manage.
  notes: CCP Task 2.2 | SAP Task 1.2
- id: 29
  slug: local-zones-latency-model
