  exams:
  - SAP
  interviews: true
  domain: Cross-Domain
  aws_service: General
  concept_tier: extension
  cognitive_role: model
  concept_spine: Perimeter-based security trusts everything inside the network boundary
    and focuses on protecting the edge, while zero trust assumes no implicit trust
    and verifies every request regardless of location — so use zero trust principles
    for modern cloud architectures with identity-based access control, encryption
    everywhere, and microsegmentation instead of relying solely on network boundaries.
  notes: SAP Task 1.2 | SAP Task 3.2
