  aws_service: AWS KMS
  concept_tier: core
  cognitive_role: contrast
  concept_spine: AWS managed keys provide encryption with no management overhead but
    you cannot control key policies or rotation schedules, while customer managed
    keys give you full control over permissions, rotation, and cross-account access
    — so use customer managed keys when you need custom permissions, compliance requirements,
    or cross-account encryption.
  notes: SAA Task 1.3 | SAP Task 1.2
- id: 646
  slug: l4-secrets-manager-vs-parameter-store-credential-management
