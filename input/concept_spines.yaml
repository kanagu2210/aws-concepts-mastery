  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: AWS IAM
  concept_tier: core
  cognitive_role: contrast
  concept_spine: Role assumption requires users to switch contexts and obtain temporary
    credentials for the target account, while resource-based policies allow direct
    access using existing credentials — so use role assumption when you want users
    to explicitly switch accounts and resource-based policies when you want seamless
    access to specific resources.
  notes: SAA Task 1.1 | SAP Task 1.2
- id: 651
  slug: l4-private-vs-public-subnets-internet-exposure-decision
  title: Private vs Public Subnet Placement for Security
  layer: 4
  layer_name: Decision Patterns
  spine_type: contrast
