  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: AWS IAM
  concept_tier: core
  cognitive_role: contrast
  concept_spine: Identity-based policies attach to IAM principals and travel with
    them everywhere, while resource-based policies attach to specific resources and
    control who can access that resource — so use resource-based when you need to
    grant cross-account access or when resource ownership matters more than user identity.
  notes: SAA Task 1.1 | SAP Task 1.2
- id: 643
  slug: l4-managed-vs-inline-policies-maintenance-scope
  title: AWS Managed vs Customer Managed vs Inline Policy Selection
  layer: 4
  layer_name: Decision Patterns
  spine_type: contrast
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: AWS IAM
  concept_tier: core
  cognitive_role: contrast
  concept_spine: AWS managed policies provide common permissions that AWS maintains
    and updates, customer managed policies give you reusable custom permissions across
    multiple principals, and inline policies create a strict one-to-one relationship
    between policy and principal — so use managed for reusability and inline only
    when the permission must never exist without that specific principal.
  notes: CCP Task 2.3 | SAA Task 1.1 | SAP Task 1.2
- id: 644
  slug: l4-security-groups-vs-nacls-stateful-vs-stateless-filtering
  title: Security Groups vs NACLs for Network Access Control
  layer: 4
