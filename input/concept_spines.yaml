  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: AWS Outposts
  concept_tier: extension
  cognitive_role: definition
  concept_spine: Outposts delivers AWS hardware and services to your own data center
