  interviews: true
  domain: Security and Compliance
  aws_service: Amazon VPC
  concept_tier: core
  cognitive_role: contrast
  concept_spine: NAT Gateways route private subnet traffic through the internet to
    reach AWS services with associated data charges, while VPC Endpoints provide direct
    private connectivity to AWS services without internet routing — so use VPC Endpoints
    for high-volume AWS service access from private subnets to save costs and improve
    security.
  notes: SAA Task 1.2 | SAP Task 1.1
- id: 653
  slug: l4-encryption-in-transit-vs-at-rest-vs-in-processing-data-protection
  title: Encryption In Transit vs At Rest vs In Processing Decision
  layer: 4
  layer_name: Decision Patterns
  spine_type: contrast
  exams:
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: core
  cognitive_role: contrast
  concept_spine: Encryption at rest protects stored data using KMS or service-managed
    keys, encryption in transit protects data moving between services using TLS/SSL,
    while encryption in processing protects data during computation using services
    like Nitro Enclaves — so implement all three for comprehensive data protection
    with at-rest being baseline, in-transit for network security, and in-processing
    for the most sensitive workloads.
  notes: SAA Task 1.3 | SAP Task 1.2
- id: 654
