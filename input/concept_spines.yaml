  aws_service: AWS IAM
  concept_tier: extension
  cognitive_role: contrast
  concept_spine: Least privilege grants only the minimum permissions needed for a
    specific task, role-based access groups permissions by job function, while attribute-based
    access uses dynamic conditions like time, location, or resource tags — so start
    with role-based for operational efficiency, apply least privilege within those
    roles, and use attribute-based conditions for advanced security requirements like
    time-based access.
  notes: SAA Task 1.1 | SAP Task 1.2
- id: 659
  slug: l4-security-monitoring-real-time-vs-scheduled-vs-event-driven-detection
