  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: Amazon VPC
  concept_tier: foundation
  cognitive_role: contrast
  concept_spine: Public subnets have direct internet access through an Internet Gateway
    and should only contain resources that need to accept inbound internet traffic,
    while private subnets have no direct internet access and should contain all backend
    resources — so put load balancers and bastion hosts in public subnets and databases,
    application servers, and business logic in private subnets.
  notes: CCP Task 3.5 | SAA Task 1.2 | SAP Task 1.1
- id: 652
  slug: l4-vpc-endpoints-vs-nat-gateway-private-service-access
