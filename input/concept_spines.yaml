  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: Amazon VPC
  concept_tier: foundation
  cognitive_role: contrast
  concept_spine: Security groups are stateful firewalls that remember connections
    and automatically allow return traffic, while NACLs are stateless firewalls that
    evaluate every packet independently — so use security groups for most access control
    and NACLs only when you need subnet-level deny rules or defense in depth.
  notes: CCP Task 3.5 | SAA Task 1.2 | SAP Task 1.2
- id: 645
  slug: l4-kms-customer-managed-vs-aws-managed-keys-control-compliance
