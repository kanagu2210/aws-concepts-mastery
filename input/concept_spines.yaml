  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: AWS WAF
  concept_tier: core
  cognitive_role: contrast
  concept_spine: Shield provides DDoS protection at the network and transport layers
    automatically, WAF filters HTTP/HTTPS requests at the application layer with custom
    rules, while Security Groups control network access at the instance level — so
    use Shield for DDoS protection, WAF for application-layer attacks like SQL injection,
    and Security Groups for basic network access control.
  notes: CCP Task 2.2 | SAA Task 1.2 | SAP Task 1.2
- id: 650
  slug: l4-assume-role-vs-cross-account-resource-policies-access-patterns
