  - SAP
  interviews: false
  domain: Cloud Concepts
  aws_service: AWS Local Zones
  concept_tier: extension
  cognitive_role: definition
  concept_spine: Local Zones extend AWS infrastructure into metro areas to support
    applications that need single-digit millisecond latency to end users, like real-time
    gaming or live video streaming.
  notes: CCP Task 3.2 | SAP Task 1.1
- id: 30
  slug: wavelength-5g-edge-model
  title: How Wavelength Brings Compute to 5G Networks
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: false
  domain: Cloud Concepts
  aws_service: AWS Wavelength
  concept_tier: extension
  cognitive_role: definition
  concept_spine: Wavelength zones embed AWS compute and storage directly inside telecom
