  exams:
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: extension
  cognitive_role: contrast
  concept_spine: Real-time monitoring like GuardDuty provides immediate threat detection
    but costs more, scheduled monitoring like Config rules runs periodically and costs
    less, while event-driven monitoring triggers on specific actions using CloudWatch
    Events — so use real-time for active threats, scheduled for compliance checks,
    and event-driven for automated responses to specific security events.
  notes: SAP Task 1.2 | SAP Task 3.2
- id: 660
  slug: l4-zero-trust-vs-perimeter-based-security-architecture-models
