  layer_name: Foundations
  spine_type: mental_model
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: core
  cognitive_role: model
  concept_spine: Choose your primary AWS Region based on where your users are located,
    what compliance requirements you must meet, which services you need, and what
    the pricing differences are.
  notes: CCP Task 3.2 | SAA Task 2.2 | SAP Task 1.1
- id: 33
  slug: data-residency-sovereignty-principle
  title: Why Your Data Stays Where You Put It
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: core
  cognitive_role: definition
  concept_spine: AWS never moves your data between Regions unless you explicitly configure
    services to do so, which lets you satisfy data residency laws that require data
    to remain within specific geographic boundaries.
  notes: CCP Task 2.1 | CCP Task 3.2 | SAP Task 1.2
- id: 34
  slug: service-availability-variance
  title: Why Not Every Service Exists in Every Region
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: false
  domain: Cloud Concepts
  aws_service: General
  concept_tier: extension
  cognitive_role: definition
  concept_spine: AWS launches new services first in the largest Regions like US East
    1 and expands to other Regions over time based on demand, so cutting-edge services
    might not be available in your preferred Region immediately.
  notes: CCP Task 3.2 | SAP Task 1.1
- id: 35
  slug: multi-region-architecture-principle
  title: When Single-Region Architecture Is Not Enough
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: core
  cognitive_role: model
  concept_spine: Multi-Region architecture becomes necessary when you need to survive
    an entire Region failure, serve users globally with low latency, or meet regulatory
    requirements that span multiple jurisdictions.
  notes: CCP Task 3.2 | SAA Task 2.2 | SAP Task 1.3
- id: 36
  slug: global-service-model
  title: How Global AWS Services Work Differently
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: extension
  cognitive_role: contrast
  concept_spine: Global services like IAM, CloudFront, and Route 53 operate across
    all Regions automatically, while regional services like EC2 and RDS exist independently
    in each Region where you launch them.
  notes: CCP Task 3.2 | SAA Task 1.1
- id: 37
  slug: eventual-consistency-global-model
  title: Why Global Services Take Time to Propagate Changes
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: extension
  cognitive_role: model
  concept_spine: Global AWS services use eventual consistency, meaning changes you
    make in one Region take time to propagate worldwide, so you might temporarily
    see different results from different locations.
  notes: CCP Task 3.2 | SAA Task 1.1 | SAP Task 3.2
- id: 38
  slug: resource-naming-scope-model
  title: Why Some AWS Resource Names Must Be Globally Unique
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: false
  domain: Cloud Concepts
  aws_service: General
  concept_tier: extension
  cognitive_role: definition
  concept_spine: Resources that need internet-accessible names like S3 buckets and
    Route 53 domains must be globally unique across all AWS accounts, while resources
    used only within your account can have duplicate names across Regions.
  notes: CCP Task 3.2 | CCP Task 3.5 | CCP Task 3.6
- id: 39
  slug: disaster-recovery-geography-model
  title: How Geographic Separation Enables Disaster Recovery
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Cloud Concepts
  aws_service: General
  concept_tier: core
  cognitive_role: model
  concept_spine: AWS Regions are separated by at least 100 miles to ensure that natural
    disasters, power grid failures, or network outages cannot affect multiple Regions
    simultaneously, giving you true geographic disaster recovery.
  notes: CCP Task 3.2 | SAA Task 2.2 | SAP Task 1.3 | SAP Task 2.2
- id: 40
  slug: infrastructure-evolution-principle
  title: How AWS Infrastructure Continues to Expand
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: false
  domain: Cloud Concepts
  aws_service: General
  concept_tier: extension
  cognitive_role: definition
  concept_spine: AWS continuously adds new Regions, Availability Zones, and edge locations
    based on customer demand and regulatory requirements, so the global infrastructure
    grows larger and closer to users over time.
  notes: CCP Task 3.2
- id: 41
  slug: aws-shared-responsibility-model
  title: How AWS and Customer Responsibilities are Split
  layer: 1
  layer_name: Foundations
  spine_type: mental_model
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: foundation
  cognitive_role: model
  concept_spine: AWS secures the cloud infrastructure while you secure everything
    you put in the cloud — the boundary shifts based on how managed the service is,
    but the principle never changes.
  notes: CCP Task 2.1 | SAA Task 1.1 | SAP Task 1.2
- id: 42
  slug: managed-service-responsibility-evolution
  title: How Responsibility Changes as Services Become More Managed
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: core
  cognitive_role: model
  concept_spine: The more AWS manages for you, the less you have to secure — Lambda
    means no OS patching, RDS means no database engine updates, but you always own
    your data and access controls.
  notes: CCP Task 2.1 | SAA Task 1.1 | SAP Task 1.2
- id: 43
  slug: customer-data-responsibility-absolute
  title: Customer Data and Access Control Ownership
  layer: 1
  layer_name: Foundations
  spine_type: concept
  exams:
  - CCP
  - SAA
  - SAP
  interviews: true
  domain: Security and Compliance
  aws_service: General
  concept_tier: core
  cognitive_role: definition
  concept_spine: You always own your data, who can access it, and how it moves — AWS
    never has access to your unencrypted data and cannot override your access controls.
  notes: CCP Task 2.1 | SAA Task 1.2 | SAP Task 1.2
- id: 44
  slug: aws-infrastructure-responsibility-scope
  title: What AWS Secures in the Infrastructure Layer
  layer: 1
