    IAM-based isolation between workloads, while multi-account architectures provide
    hard security boundaries but require more complex management — so use single account
    for small teams with trusted users and multi-account when you need compliance
    isolation, different security postures, or separate billing for different business
    units.
  notes: SAP Task 1.4
- id: 655
